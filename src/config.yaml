site:
  name: "Software Engineer's Journal"
  site: 'https://apenlor.github.io'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: hSeQSNcx1TtaLK3s-arlswtwYnrEV6Ajjl9akS1n0tQ

# Default SEO metadata
metadata:
  title:
    default: "Software Engineer's Journal"
    template: "%s — Software Engineer's Journal"
  description: "Personal site sharing insights, experiences, and thoughts on Software Engineering. Development, Quality Assurance and DevOps"
  robots:
    index: true
    follow: true
  openGraph:
    site_name: "Software Engineer's Journal"
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@apenlor'
    site: '@apenlor'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 5

    post:
      isEnabled: true
      permalink: '/blog/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
